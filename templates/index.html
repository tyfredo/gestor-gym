<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gym System UG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-5 fw-bold">GESTIÓN DE GIMNASIO - DICIS</h2>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white text-center"><h5>Panel Admin</h5></div>
                    <div class="card-body">
                        <form id="formAdmin">
                            <div class="mb-3">
                                <label class="form-label fw-bold">ID Socio</label>
                                <input type="text" id="adminId" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre</label>
                                <input type="text" id="adminNombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Recepcionista</label>
                                <select id="adminRecepcionista" class="form-select">
                                    <option value="1">Gerardo</option>
                                    <option value="2">Ana</option>
                                    <option value="3">Carlos</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Fecha Pago</label>
                                <input type="date" id="adminFecha" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Actualizar Pago</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center"><h5>Consulta</h5></div>
                    <div class="card-body">
                        <form id="formConsulta">
                            <div class="input-group">
                                <input type="text" id="consultaId" class="form-control" placeholder="ID Socio">
                                <button class="btn btn-primary" type="submit">Buscar</button>
                            </div>
                        </form>
                        <div id="resultadoConsulta" class="mt-4 d-none">
                            <div id="alertaEstatus" class="alert shadow-sm">
                                <h4 id="resNombre"></h4>
                                <hr>
                                <p id="resMensaje" style="white-space: pre-line;"></p>
                                <button id="btnRenovar" class="btn btn-danger mt-3 w-100 d-none">Agregar nuevo pago</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
