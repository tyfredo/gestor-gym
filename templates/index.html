<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Control Pro - DICIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="bg-gradient-shapes"></div>

    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
        
        <div class="text-center mb-5 animate-fade-in">
            <h1 class="fw-black display-4 text-dark mb-0">GYM<span class="text-primary">PRO</span></h1>
        </div>

        <div class="row w-100 justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="card main-card border-0 shadow-2xl animate-scale-up">
                    <div class="card-body p-5">
                        <div class="d-flex align-items-center mb-4">
                            <div class="icon-box bg-dark text-white me-3">
                                <i class="bi bi-person-plus-fill"></i>
                            </div>
                            <h4 class="fw-bold mb-0">Registrar Socio</h4>
                        </div>

                        <form id="formAdmin">
                            <div class="custom-input-group mb-3">
                                <label class="small fw-bold text-muted">IDENTIFICADOR</label>
                                <input type="text" id="adminId" class="form-control-custom" placeholder="Ej: SOC-001" required>
                            </div>
                            
                            <div class="custom-input-group mb-3">
                                <label class="small fw-bold text-muted">NOMBRE DEL CLIENTE</label>
                                <input type="text" id="adminNombre" class="form-control-custom" placeholder="Nombre completo" required>
                            </div>

                            <div class="custom-input-group mb-3">
                                <label class="small fw-bold text-muted">PLAN DE MEMBRESÍA</label>
                                <select id="adminMembresia" class="form-select-custom">
                                    <option value="1">Básica</option>
                                    <option value="2">Premium</option>
                                    <option value="3">Anual</option>
                                    <option value="4">Estudiante</option>
                                    <option value="5">VIP</option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="small fw-bold text-muted">RECEPCIONISTA</label>
                                    <select id="adminRecepcionista" class="form-select-custom">
                                        <option value="1">Gerardo</option>
                                        <option value="2">Ana</option>
                                        <option value="3">Carlos</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="small fw-bold text-muted">FECHA DE PAGO</label>
                                    <input type="date" id="adminFecha" class="form-control-custom" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary-grad w-100 py-3 mt-3 fw-bold">
                                GUARDAR REGISTRO <i class="bi bi-shield-check ms-2"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="btnOpenSearch" class="btn-fab shadow-lg">
        <i class="bi bi-search"></i>
    </button>

    <div id="searchOverlay" class="search-overlay">
        <div class="search-container container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="search-card animate-mac-in">
                        <div class="search-header p-4 d-flex align-items-center">
                            <i class="bi bi-search fs-4 text-muted me-3"></i>
                            <form id="formConsulta" class="w-100">
                                <input type="text" id="consultaId" class="search-input" placeholder="Buscar por ID (Presiona Enter)" autocomplete="off">
                            </form>
                            <button id="btnCloseSearch" class="btn-close-mac ms-2"><i class="bi bi-x-lg"></i></button>
                        </div>
                        
                        <div id="searchPlaceholder" class="p-5 text-center text-muted">
                            <i class="bi bi-keyboard fs-1 d-block mb-3 opacity-25"></i>
                            <p>Escribe el ID del socio para validar su estatus</p>
                        </div>

                        <div id="resultadoConsulta" class="p-4 d-none border-top">
                            <div class="d-flex align-items-center">
                                <div class="position-relative">
                                    <img id="resAvatar" src="" class="avatar-mac shadow" alt="User">
                                    <div id="resBadge" class="status-badge"></div>
                                </div>
                                <div class="ms-4 flex-grow-1">
                                    <h3 id="resNombre" class="fw-bold mb-1"></h3>
                                    <p id="resMensaje" class="text-muted small mb-0" style="white-space: pre-line;"></p>
                                </div>
                            </div>
                            <div id="actionBox" class="mt-4 pt-3 border-top d-none">
                                <button id="btnRenovar" class="btn btn-danger-soft w-100 py-2 fw-bold">
                                    <i class="bi bi-arrow-repeat me-2"></i>Renovar Suscripción
                                </button>
                            </div>
                        </div>
                    </div>
                    <p class="text-center text-white mt-4 opacity-50 small">ESC para cerrar</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
